<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title">
          <h1>Rock Paper Scissors</h1>
    </div>
    <div class="container">
    <div class="choice" id="rock">
        <img src="/Rock-Paper-Scissor/rock.png" />
        
    </div>
    <div class="choice" id="paper">
        <img src="/Rock-Paper-Scissor/paper .png"/>
        
    </div>
    <div class="choice" id="scissors">
        <img src="/Rock-Paper-Scissor/scissors .png"/>
        
    </div>
    </div>
    <div class="score-board">
        <div class="user">
            <p id="user-score">0</p>
            <p>User</p>
        </div>
        <div class="computer">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Start Your move</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
